<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;700&display=swap" rel="stylesheet">

        crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    <div class="main-container">
        <header> 
            <!-- ici j'ai inséré le logo du site puis j'ai fait le menu -->
            <section>
            <nav class="navbar">
                <img class="logo" src="images/logo/Booki.png" alt="Logo du site"> 
            
                <div class="container_navbar">
                    <ul>
                        <li><a class="navbar1" href="#Hébergements">Hébergements</a> </li>
                        <li><a class="navbar2" href="#Activités">Activités</a> </li>
                    </ul>
                </div>
            </nav>
            </section>
             <!-- ici j'ai insére une nouvelle section qui est le h1 et la barre de recherche -->
            <section>
                <h1>Trouvez votre Hébergement pour des vacances de rêves</h1>
                <p>En plein centre ville ou pleine nature</p>

                <div class="research">
                    <form>
               
                        <i class="fa-sharp fa-solid fa-location-dot"></i>
                        <input class="search" type="search" placeholder="Marseille, France">
                        <button>Rechercher</button>
                    
                    </form>
                </div>
            </section>
        </header>
        <main>
           
            <section>
                <div class="filter" >
                    <h3>Filtres</h3>
                        <div class="filterIcon">
                            <Button><i class="fa-solid fa-money-bill-wave"></i> Econimique</Button>
                            <button> <i class="fa-solid fa-person"></i> Familial </button>
                            <button><i class="fa-solid fa-heart"></i> Romantique</button>
                            <button><i class="fa-solid fa-fire icon4"></i>Nos pépites</button>
                        </div>
                       
                </div>

            <div class="iconInformation">
                <i class="fa-solid fa-info icon-info"></i> <p> Plus de 500 logements sont disponibles dans cette ville</p>
            </div>
            </section>
            </main>
